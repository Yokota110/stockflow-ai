services:
  postgres:
    image: postgres:16-alpine
    container_name: stockflow-db
    restart: unless-stopped
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow
      POSTGRES_DB: stockflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
